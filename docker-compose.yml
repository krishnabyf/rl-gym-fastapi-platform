services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: docker
      LOG_LEVEL: INFO
      JOB_RETENTION_LIMIT: 500
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 20s
      timeout: 5s
      retries: 3

